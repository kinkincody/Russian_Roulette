<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Survival Roulette - Fixed Alignment</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .main-game-area {
            display: flex;
            gap: 40px;
            background: #151515;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #222;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            align-items: center;
            transform: scale(0.95);
        }

        /* Voltage Meter */
        .voltage-section { text-align: center; }
        #voltage-num { font-size: 40px; font-weight: bold; color: #00ff00; margin-bottom: 10px; font-family: monospace; }
        #meter-bar {
            width: 60px; height: 240px;
            background: #000; border: 4px solid #333;
            position: relative; margin: 0 auto; border-radius: 5px;
        }
        #fill {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            transition: height 0.3s ease-out;
        }

        /* Fixed Revolver Cylinder */
        .revolver-visual { 
            position: relative; 
            width: 220px; 
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #cylinder {
            width: 210px; 
            height: 210px;
            background-color: #2a2a2a;
            border-radius: 50%;
            border: 8px solid #444;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            box-shadow: inset 0 0 40px #000;
            -webkit-backface-visibility: hidden; /* Fix for iPad Safari jitter */
        }

        .chamber-hole {
            position: absolute;
            width: 45px; 
            height: 45px;
            background: #111;
            border-radius: 50%;
            border: 2px solid #333;
            /* Center calculation: (CylinderWidth/2) - (HoleWidth/2) */
            left: calc(50% - 22.5px);
            top: calc(50% - 22.5px);
        }

        .hammer-marker {
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid #ff4444; z-index: 10;
        }

        .roulette-section { text-align: center; width: 180px; }
        .danger-box {
            background: #300; padding: 20px;
            border-radius: 15px; margin: 15px 0;
            border: 2px solid #ff4444;
        }
        #chance-text { font-size: 38px; font-weight: bold; font-family: monospace; color: #ff4444; }
        
        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 480px; }
        button {
            padding: 20px; font-size: 22px; font-weight: bold;
            cursor: pointer; border: none; border-radius: 15px;
            text-transform: uppercase; -webkit-tap-highlight-color: transparent;
        }
        .btn-wrong { background: #b71c1c; color: white; }
        .btn-correct { background: #1b5e20; color: white; }
        .btn-trigger { 
            background: #fff; color: #000; font-size: 26px; 
            display: none; width: 100%; animation: pulse 0.6s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .used-chamber { background: #000 !important; border-color: #222 !important; }
        .used-chamber::after { 
            content: '✕'; color: #ff4444; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold;
        }

        #log { font-size: 18px; margin-top: 20px; color: #666; font-weight: bold; }
        .shake { animation: screenShake 0.1s infinite; }
        @keyframes screenShake { 0% { transform: translate(4px,4px); } 50% { transform: translate(-4px,-4px); } 100% { transform: translate(4px,-4px); } }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SURVIVAL ROULETTE</h1>
        <button onclick="unlockAudio()" style="background: #00ff00; color: black; padding: 20px 40px; border-radius: 50px;">INITIALIZE SYSTEM</button>
        <p style="margin-top: 20px; color: #666;">Optimized for Tablet Touch</p>
    </div>

    <div class="main-game-area" id="board">
        <div class="voltage-section">
            <div id="voltage-num">0 / 10</div>
            <div id="meter-bar"><div id="fill"></div></div>
        </div>

        <div class="revolver-visual">
            <div class="hammer-marker"></div>
            <div id="cylinder"></div>
        </div>

        <div class="roulette-section">
            <div class="danger-box">
                <span id="chance-text">16%</span>
            </div>
            <button id="trigger-btn" class="btn-trigger" onclick="pullTrigger()">PULL TRIGGER</button>
        </div>
    </div>

    <div id="log">READY</div>

    <div class="controls">
        <div id="action-btns" style="display: flex; gap: 12px;">
            <button class="btn-wrong" style="flex: 1.5;" onclick="wrongAns()">WRONG</button>
            <button class="btn-correct" style="flex: 1;" onclick="correctAns()">CORRECT</button>
        </div>
        <button onclick="resetGame()" style="background: #222; color: #444; font-size: 14px;">RELOAD SYSTEM</button>
    </div>

    <script>
        let voltage = 0;
        let bulletPos = Math.floor(Math.random() * 6);
        let currentShotIdx = 0;
        let rotation = 0;
        let audioCtx;

        function unlockAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
        }

        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'voltage') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, now);
                gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                osc.start(); osc.stop(now + 0.04);
            } else if (type === 'click_mechanical') {
                osc.type = 'square'; osc.frequency.setValueAtTime(120, now);
                gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.008);
                osc.start(); osc.stop(now + 0.01);
            } else if (type === 'empty') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'boom') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noise.connect(noiseGain); noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.4, now); noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                noise.start();
            }
        }

        function createChambers() {
            const cyl = document.getElementById('cylinder');
            cyl.innerHTML = '';
            const radius = 72; // Distance from center
            for (let i = 0; i < 6; i++) {
                const hole = document.createElement('div');
                hole.className = 'chamber-hole';
                hole.id = `hole-${i}`;
                const angle = (i * 60 - 90) * (Math.PI / 180);
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);
                // Use translate to place them relative to the center of the cylinder
                hole.style.transform = `translate(${x}px, ${y}px)`;
                cyl.appendChild(hole);
            }
        }

        function updateUI() {
            document.getElementById('voltage-num').innerText = `${voltage} / 10`;
            document.getElementById('fill').style.height = (voltage * 10) + "%";
            document.getElementById('chance-text').innerText = Math.round((1 / (6 - currentShotIdx)) * 100) + "%";
            if (voltage >= 10) {
                document.getElementById('trigger-btn').style.display = "block";
                document.getElementById('action-btns').style.display = "none";
                document.getElementById('board').style.borderColor = "red";
            } else {
                document.getElementById('trigger-btn').style.display = "none";
                document.getElementById('action-btns').style.display = "flex";
                document.getElementById('board').style.borderColor = "#222";
            }
        }

        function wrongAns() {
            playSound('voltage');
            let spinCount = 0;
            let spinInterval = setInterval(() => {
                playSound('click_mechanical');
                spinCount++;
                if (spinCount > 6) clearInterval(spinInterval);
            }, 50);
            voltage = Math.min(10, voltage + Math.floor(Math.random() * 4) + 1);
            rotation += (360 + Math.floor(Math.random() * 360));
            document.getElementById('cylinder').style.transform = `rotate(${rotation}deg)`;
            updateUI();
        }

        function correctAns() { voltage = Math.max(0, voltage - 2); updateUI(); }

        function pullTrigger() {
            document.getElementById('trigger-btn').disabled = true;
            let targetRotation = currentShotIdx * -60;
            let baseRotation = Math.floor(rotation / 360) * 360;
            rotation = baseRotation + targetRotation;
            document.getElementById('cylinder').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                if (currentShotIdx === bulletPos) {
                    playSound('boom');
                    document.body.classList.add('shake');
                    document.body.style.background = "#600";
                    setTimeout(resetGame, 4000);
                } else {
                    playSound('empty');
                    document.getElementById(`hole-${currentShotIdx}`).classList.add('used-chamber');
                    currentShotIdx++;
                    setTimeout(() => {
                        voltage = 0;
                        updateUI();
                        document.getElementById('trigger-btn').disabled = false;
                    }, 800);
                }
            }, 600);
        }

        function resetGame() {
            voltage = 0; currentShotIdx = 0; rotation = 0;
            bulletPos = Math.floor(Math.random() * 6);
            document.getElementById('cylinder').style.transform = `rotate(0deg)`;
            document.body.classList.remove('shake');
            document.body.style.background = "#0a0a0a";
            document.getElementById('trigger-btn').disabled = false;
            createChambers();
            updateUI();
        }

        createChambers();
        updateUI();
    </script>
</body>
</html>
